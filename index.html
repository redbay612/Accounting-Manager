<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出紀錄管理系統 - 修正編輯版</title>
    <style>
        :root { --primary: #4338ca; --success: #059669; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        /* 輸入與工具列 */
        .input-card { background: #fff; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        
        button { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: #0ea5e9; color: white; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .search-input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; }

        /* 表格樣式 */
        .table-container { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        /* 操作按鈕 */
        .btn-edit { background: #f59e0b; color: white; padding: 4px 8px; font-size: 12px; margin-right: 5px; }
        .btn-del { background: var(--danger); color: white; padding: 4px 8px; font-size: 12px; }

        /* 統計區 */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .summary-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-weight: bold; }
        .total-val { color: var(--primary); font-size: 1.2rem; }

        /* 編輯彈窗 */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-top: 0; }
        .modal-content input { display: block; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 支出管理系統 (修正編輯版)</h1>

    <!-- 輸入區 -->
    <div class="input-card">
        <input type="text" id="category" placeholder="類別 (如: 星展卡費)">
        <input type="number" id="amount" placeholder="金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增</button>
    </div>

    <!-- 工具列 -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋類別或日期..." oninput="renderAll()">
        <div style="display: flex; gap: 8px;">
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            <button class="btn-export" onclick="exportToCSV()">💾 匯出</button>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>支出類別</th>
                    <th style="text-align: right;">支付金額</th>
                    <th>日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 統計 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h3>📂 分類統計</h3>
            <div id="categorySummary"></div>
            <div id="grandTotal" class="summary-item" style="border-top:2px solid #4338ca; margin-top:10px;"></div>
        </div>
        <div class="summary-box">
            <h3>📅 月度統計</h3>
            <div id="monthlySummary"></div>
        </div>
    </div>
</div>

<!-- 編輯視窗 -->
<div id="editModal">
    <div class="modal-content">
        <h3>✏️ 編輯紀錄</h3>
        <label>類別：</label><input type="text" id="editCat">
        <label>金額：</label><input type="number" id="editAmt">
        <label>日期：</label><input type="date" id="editDate">
        <input type="hidden" id="editId">
        <div style="display: flex; gap: 10px;">
            <button class="btn-add" style="flex:1" onclick="saveEdit()">儲存修改</button>
            <button class="btn-del" style="flex:1; background:#94a3b8" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    let expenses = (JSON.parse(localStorage.getItem('expense_v11')) || []);

    renderAll();

    function renderAll() {
        renderTable();
        renderSummaries();
    }

    // 新增
    function addItem() {
        const cat = document.getElementById('category').value.trim();
        const amt = document.getElementById('amount').value;
        const date = document.getElementById('dueDate').value;

        if (!cat || !amt || !date) return alert('請完整填寫');

        expenses.push({
            id: Date.now(),
            category: cat,
            amount: Number(amt),
            date: date
        });

        saveAndRefresh();
        document.getElementById('category').value = '';
        document.getElementById('amount').value = '';
    }

    // 渲染表格
    function renderTable() {
        const tbody = document.getElementById('expenseList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        const filtered = expenses.filter(i => 
            i.category.toLowerCase().includes(search) || i.date.includes(search)
        ).sort((a,b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${item.category}</b></td>
                <td style="text-align: right; font-weight: bold; color: var(--primary);">$${Number(item.amount).toLocaleString()}</td>
                <td>${item.date}</td>
                <td>
                    <button class="btn-edit" onclick="openEdit(${item.id})">編輯</button>
                    <button class="btn-del" onclick="deleteItem(${item.id})">刪除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 統計
    function renderSummaries() {
        const catMap = {}, monMap = {};
        let total = 0;

        expenses.forEach(item => {
            const val = Number(item.amount) || 0;
            catMap[item.category] = (catMap[item.category] || 0) + val;
            monMap[item.date.substring(0, 7)] = (monMap[item.date.substring(0, 7)] || 0) + val;
            total += val;
        });

        document.getElementById('categorySummary').innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
            <div class="summary-item"><span>${k}</span><span>$${v.toLocaleString()}</span></div>
        `).join('') || '無資料';

        document.getElementById('grandTotal').innerHTML = `<span>總計支出</span><span class="total-val">$${total.toLocaleString()}</span>`;

        document.getElementById('monthlySummary').innerHTML = Object.entries(monMap).sort().reverse().slice(0, 5).map(([k,v]) => `
            <div class="summary-item"><span>${k}</span><span>$${v.toLocaleString()}</span></div>
        `).join('') || '無資料';
    }

    // 編輯功能
    function openEdit(id) {
        const item = expenses.find(i => i.id === id);
        document.getElementById('editCat').value = item.category;
        document.getElementById('editAmt').value = item.amount;
        document.getElementById('editDate').value = item.date;
        document.getElementById('editId').value = id;
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveEdit() {
        const id = Number(document.getElementById('editId').value);
        const item = expenses.find(i => i.id === id);
        item.category = document.getElementById('editCat').value;
        item.amount = Number(document.getElementById('editAmt').value);
        item.date = document.getElementById('editDate').value;
        
        saveAndRefresh();
        closeModal();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function deleteItem(id) {
        if(confirm('確定刪除？')) { expenses = expenses.filter(i => i.id !== id); saveAndRefresh(); }
    }

    function saveAndRefresh() { localStorage.setItem('expense_v11', JSON.stringify(expenses)); renderAll(); }

    function exportToCSV() {
        let csv = "\uFEFF類別,支付金額,日期\n";
        expenses.forEach(i => csv += `${i.category},${i.amount},${i.date}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `支出備份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    // 核心修正：匯入辨識邏輯 (排除日期當金額)
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            const imported = [];
            
            for (let i = 1; i < rows.length; i++) {
                const line = rows[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
                
                let detectedDate = "";
                let detectedAmount = NaN;
                let detectedCategory = "";

                cols.forEach(col => {
                    // 1. 強力日期辨識：必須包含 - 或 /，且長度足夠
                    if (/\d{4}[-/]\d{1,2}/.test(col)) {
                        detectedDate = col.replace(/\//g, '-');
                    } 
                    // 2. 金額辨識：純數字，且「絕不包含」橫線
                    else if (!isNaN(parseFloat(col.replace(/[$,]/g, ''))) && !col.includes('-')) {
                        detectedAmount = parseFloat(col.replace(/[$,]/g, ''));
                    }
                    // 3. 類別辨識：剩下的純文字
                    else if (col.length > 0) {
                        detectedCategory = col;
                    }
                });

                if (!isNaN(detectedAmount) && detectedDate) {
                    imported.push({
                        id: Date.now() + Math.random() + i,
                        category: detectedCategory || "未分類",
                        amount: detectedAmount,
                        date: detectedDate
                    });
                }
            }
            if (imported.length > 0) {
                if(confirm(`成功讀取 ${imported.length} 筆資料！`)) {
                    expenses = [...expenses, ...imported];
                    saveAndRefresh();
                }
            } else { alert('無法辨識，請確保 CSV 包含正確日期格式與金額'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
