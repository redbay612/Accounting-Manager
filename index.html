<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出管理系統 - 欄位修正版</title>
    <style>
        :root { --primary: #4338ca; --secondary: #64748b; --success: #059669; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #1e293b; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        
        .input-card { background: #f1f5f9; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: #0ea5e9; color: white; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        .search-input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; min-width: 200px; }
        
        .group-toggle { display: flex; align-items: center; gap: 8px; background: #fffbeb; padding: 10px 15px; border-radius: 8px; border: 1px solid #fef3c7; font-weight: bold; color: #92400e; cursor: pointer; }

        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .summary-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .total-row { border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 10px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #e2e8f0; color: #475569; }
        .count-badge { background: var(--primary); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; margin-left: 5px; }

        #fileInput { display: none; }
        @media (max-width: 850px) { .input-card, .summary-grid { grid-template-columns: 1fr; } .toolbar { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 專業支出管理 (智慧統整版)</h1>

    <!-- 1. 輸入區 -->
    <div class="input-card">
        <select id="category">
            <option value="卡費">💳 卡費</option>
            <option value="貸款">🏠 貸款</option>
            <option value="保險">🛡️ 保險</option>
            <option value="生活費">🥗 生活費</option>
            <option value="其他">📦 其他</option>
        </select>
        <input type="text" id="desc" placeholder="項目明細 (如: 台新信用卡)">
        <input type="number" id="amount" placeholder="金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增項目</button>
    </div>

    <!-- 2. 工具列 -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋名稱、日期或類別..." oninput="renderAll()">
        
        <label class="group-toggle">
            <input type="checkbox" id="groupMode" onchange="renderAll()"> 統整相同項目
        </label>

        <div style="display: flex; gap: 8px;">
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入備份</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            <button class="btn-export" onclick="exportToCSV()">💾 匯出備份</button>
        </div>
    </div>

    <!-- 3. 資料表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>類別</th>
                    <th>明細名稱</th>
                    <th style="text-align: right;">應繳金額</th>
                    <th>繳款期限/次數</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 4. 統計區 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h3>📂 分類累計</h3>
            <div id="categorySummary"></div>
            <div id="categoryVerify" class="total-row"></div>
        </div>
        <div class="summary-box">
            <h3>📅 月度統計</h3>
            <div id="monthlySummary"></div>
        </div>
        <div class="summary-box">
            <h3>年度統計</h3>
            <div id="yearlySummary"></div>
        </div>
    </div>
</div>

<script>
    // 初始化與資料清洗
    let expenses = (JSON.parse(localStorage.getItem('expense_v7')) || []).map(item => ({
        id: item.id || Date.now() + Math.random(),
        category: String(item.category || "其他").trim(),
        desc: String(item.desc || "").trim(),
        amount: Number(item.amount) || 0,
        date: item.date || new Date().toISOString().split('T')[0]
    }));

    renderAll();

    function renderAll() {
        renderTable();
        renderSummaries();
    }

    function addItem() {
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('desc').value.trim().replace(/,/g, ''); // 移除逗號防止CSV出錯
        const amt = document.getElementById('amount').value;
        const date = document.getElementById('dueDate').value;

        if (!desc || !amt || !date) return alert('請填寫完整資訊');

        expenses.push({
            id: Date.now() + Math.random(),
            category: cat,
            desc: desc,
            amount: Number(amt),
            date: date
        });

        saveAndRefresh();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function renderTable() {
        const tbody = document.getElementById('expenseList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const isGroupMode = document.getElementById('groupMode').checked;
        tbody.innerHTML = '';

        let data = expenses.filter(i => 
            i.desc.toLowerCase().includes(search) || 
            i.category.toLowerCase().includes(search) ||
            i.date.includes(search)
        );

        if (isGroupMode) {
            const grouped = {};
            data.forEach(item => {
                const key = `${item.category}-${item.desc}`;
                if (!grouped[key]) {
                    grouped[key] = { ...item, count: 1 };
                } else {
                    grouped[key].amount += item.amount;
                    grouped[key].count += 1;
                    if (new Date(item.date) > new Date(grouped[key].date)) grouped[key].date = item.date;
                }
            });
            data = Object.values(grouped).sort((a, b) => b.amount - a.amount);
        } else {
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge">${item.category}</span></td>
                <td><b>${item.desc}</b>${isGroupMode ? `<span class="count-badge">${item.count} 筆</span>` : ''}</td>
                <td style="text-align: right; font-weight: bold; color: ${isGroupMode ? 'var(--primary)' : 'inherit'}">
                    $${Number(item.amount).toLocaleString()}
                </td>
                <td>${isGroupMode ? '最後日期: '+item.date : item.date}</td>
                <td>
                    ${isGroupMode ? '' : `<button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:2px 5px; font-size:12px;">刪除</button>`}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderSummaries() {
        const catMap = {}, monMap = {}, yearMap = {};
        let grandTotal = 0;

        expenses.forEach(item => {
            const val = Number(item.amount) || 0;
            const mon = item.date.substring(0, 7);
            const year = item.date.substring(0, 4);

            catMap[item.category] = (catMap[item.category] || 0) + val;
            monMap[mon] = (monMap[mon] || 0) + val;
            yearMap[year] = (yearMap[year] || 0) + val;
            grandTotal += val;
        });

        document.getElementById('categorySummary').innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([k,v]) => 
            `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';
        document.getElementById('categoryVerify').innerHTML = `<span>總支出：</span><span>$${grandTotal.toLocaleString()}</span>`;
        document.getElementById('monthlySummary').innerHTML = Object.entries(monMap).sort().reverse().slice(0, 5).map(([k,v]) => 
            `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';
        document.getElementById('yearlySummary').innerHTML = Object.entries(yearMap).sort().reverse().map(([k,v]) => 
            `<div class="summary-item" style="color:var(--primary); font-weight:bold;"><span>${k} 年</span><span>$${v.toLocaleString()}</span></div>`).join('') || '無';
    }

    function deleteItem(id) {
        if (confirm('確定刪除？')) {
            expenses = expenses.filter(i => i.id !== id);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('expense_v7', JSON.stringify(expenses));
        renderAll();
    }

    // 匯出功能：移除項目名稱中的逗號，確保 CSV 結構正確
    function exportToCSV() {
        if (expenses.length === 0) return alert('無資料');
        let csv = "\uFEFF類別,項目名稱,金額,日期\n";
        expenses.forEach(i => {
            const cleanDesc = String(i.desc).replace(/,/g, ' '); 
            csv += `${i.category},${cleanDesc},${i.amount},${i.date}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `支出備份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    // 匯入功能：智慧對位邏輯
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            const imported = [];
            
            for (let i = 1; i < rows.length; i++) {
                const line = rows[i].replace('\r', '').trim();
                if (!line) continue;
                const cols = line.split(',');
                if (cols.length < 3) continue;

                // 智慧判斷欄位：
                // 通常順序是 0:類別, 1:名稱, 2:金額, 3:日期
                // 但如果發現 cols[2] 裡有 "-"，說明 cols[2] 其實是日期
                let category = cols[0].trim();
                let desc = cols[1].trim();
                let amount = 0;
                let date = "";

                // 嘗試找尋哪一欄是日期 (格式 XXXX-XX-XX)
                const dateIdx = cols.findIndex(c => c.includes('-') && c.length >= 8);
                // 嘗試找尋哪一欄是純數字 (金額)
                const amtIdx = cols.findIndex((c, idx) => idx > 1 && !isNaN(Number(c.replace(/[^\d.]/g, ''))) && !c.includes('-'));

                if (dateIdx !== -1) date = cols[dateIdx].trim();
                if (amtIdx !== -1) amount = Number(cols[amtIdx].replace(/[^\d.]/g, ''));
                else if (dateIdx === 2 && !isNaN(Number(cols[3]))) amount = Number(cols[3]); // 備用方案

                if (!isNaN(amount) && date) {
                    imported.push({
                        id: Date.now() + Math.random() + i,
                        category: category || "其他",
                        desc: desc || "未命名",
                        amount: amount,
                        date: date
                    });
                }
            }
            if (imported.length > 0) {
                if (confirm(`讀取到 ${imported.length} 筆資料，要合併至現有清單嗎？`)) {
                    expenses = [...expenses, ...imported];
                } else { expenses = imported; }
                saveAndRefresh();
            } else { alert('無法解析檔案，請確保 CSV 包含金額與日期（格式如 2023-01-01）'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
