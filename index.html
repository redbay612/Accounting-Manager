<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業財務支出管理系統 - 支援匯入匯出</title>
    <style>
        :root {
            --primary: #4338ca;
            --secondary: #64748b;
            --success: #059669;
            --danger: #dc2626;
            --info: #0ea5e9;
            --bg: #f1f5f9;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        h2 { font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; margin: 20px 0 10px 0; }

        /* 輸入區域 */
        .input-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr 1.2fr auto;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        input, select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        button {
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: var(--info); color: white; }
        .btn-clear { background: var(--secondary); color: white; font-size: 12px; margin-left: 10px; }

        /* 工具列 */
        .toolbar {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            max-width: 400px;
        }

        .action-btns { display: flex; gap: 10px; }

        /* 表格樣式 */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .category-貸款 { background: #fee2e2; color: #b91c1c; }
        .category-卡費 { background: #fef3c7; color: #92400e; }
        .category-保險 { background: #dcfce7; color: #15803d; }
        .category-生活費 { background: #dbeafe; color: #1e40af; }

        /* 統計區塊 */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 25px; }
        .summary-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }

        /* 隱藏的檔案輸入框 */
        #fileInput { display: none; }

        @media (max-width: 800px) {
            .input-card { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 專業支出管理系統</h1>

    <!-- 1. 輸入區 -->
    <div class="input-card">
        <select id="category">
            <option value="卡費">💳 卡費</option>
            <option value="貸款">🏠 貸款</option>
            <option value="保險">🛡️ 保險</option>
            <option value="生活費">🥗 生活費</option>
            <option value="其他">📦 其他</option>
        </select>
        <input type="text" id="desc" placeholder="項目名稱 (如: 富邦銀行)">
        <input type="number" id="amount" placeholder="金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增紀錄</button>
    </div>

    <!-- 2. 工具列 (搜尋與匯入匯出) -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋名稱或類別..." oninput="renderTable()">
        
        <div class="action-btns">
            <!-- 匯入功能 -->
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入備份</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            
            <!-- 匯出功能 -->
            <button class="btn-export" onclick="exportToCSV()">💾 匯出備份</button>
        </div>
    </div>

    <!-- 3. 明細清單 -->
    <div class="table-container">
        <h2>📝 支出明細 <button class="btn-clear" onclick="clearAllData()">全部清空</button></h2>
        <table>
            <thead>
                <tr>
                    <th>類別</th>
                    <th>明細名稱</th>
                    <th style="text-align: right;">應繳金額</th>
                    <th>繳款期限</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 4. 統計報表 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h2>按類別累計</h2>
            <div id="categorySummary"></div>
        </div>
        <div class="summary-box">
            <h2>月度總計</h2>
            <div id="monthlySummary"></div>
        </div>
        <div class="summary-box">
            <h2>年度累計</h2>
            <div id="yearlySummary"></div>
        </div>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('my_expense_v3')) || [];

    // --- 核心功能 ---

    function addItem() {
        const category = document.getElementById('category').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const dueDate = document.getElementById('dueDate').value;

        if (!desc || !amount || !dueDate) {
            alert('請填寫完整資訊');
            return;
        }

        const item = {
            id: Date.now() + Math.random(), // 確保唯一性
            category,
            desc,
            amount: parseFloat(amount),
            date: dueDate,
            year: dueDate.substring(0, 4),
            month: dueDate.substring(0, 7)
        };

        expenses.push(item);
        saveAndRender();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteItem(id) {
        if(confirm('確定刪除？')) {
            expenses = expenses.filter(e => e.id !== id);
            saveAndRender();
        }
    }

    function clearAllData() {
        if(confirm('警告！這將刪除所有紀錄，確定嗎？')) {
            expenses = [];
            saveAndRender();
        }
    }

    // --- 匯入/匯出功能 ---

    function exportToCSV() {
        if (expenses.length === 0) return alert('無資料可匯出');
        
        let csv = "\uFEFF類別,項目名稱,應繳金額,繳款期限,月份\n";
        expenses.forEach(e => {
            csv += `${e.category},${e.desc},${e.amount},${e.date},${e.month}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `支出備份_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split('\n');
            const newRecords = [];

            // 從第二行開始讀取 (跳過標題)
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const cols = line.split(',');
                if (cols.length >= 4) {
                    const category = cols[0];
                    const desc = cols[1];
                    const amount = parseFloat(cols[2]);
                    const date = cols[3];

                    if (category && desc && !isNaN(amount) && date) {
                        newRecords.push({
                            id: Date.now() + Math.random() + i,
                            category,
                            desc,
                            amount,
                            date,
                            year: date.substring(0, 4),
                            month: date.substring(0, 7)
                        });
                    }
                }
            }

            if (newRecords.length > 0) {
                if (confirm(`偵測到 ${newRecords.length} 筆資料，要將其合併到現有紀錄中嗎？`)) {
                    expenses = [...expenses, ...newRecords];
                    saveAndRender();
                    alert('匯入成功！');
                }
            } else {
                alert('匯入失敗：檔案格式不正確或無資料');
            }
            // 清除 input 以便下次選擇同檔案還能觸發
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    // --- 渲染與計算 ---

    function saveAndRender() {
        localStorage.setItem('my_expense_v3', JSON.stringify(expenses));
        renderTable();
        renderSummaries();
    }

    function renderTable() {
        const list = document.getElementById('expenseList');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = '';

        const filtered = expenses.filter(item => 
            item.desc.toLowerCase().includes(searchTerm) || 
            item.category.toLowerCase().includes(searchTerm)
        ).sort((a, b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="badge category-${item.category}">${item.category}</span></td>
                <td>${item.desc}</td>
                <td style="text-align: right; font-weight: bold;">$${item.amount.toLocaleString()}</td>
                <td>${item.date}</td>
                <td><button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:2px 5px; font-size:12px;">刪除</button></td>
            `;
            list.appendChild(row);
        });
    }

    function renderSummaries() {
        const catMap = {}, monMap = {}, yearMap = {};
        expenses.forEach(e => {
            catMap[e.category] = (catMap[e.category] || 0) + e.amount;
            monMap[e.month] = (monMap[e.month] || 0) + e.amount;
            yearMap[e.year] = (yearMap[e.year] || 0) + e.amount;
        });

        document.getElementById('categorySummary').innerHTML = Object.entries(catMap).map(([k, v]) => 
            `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';

        document.getElementById('monthlySummary').innerHTML = Object.entries(monMap).sort().reverse().slice(0, 5).map(([k, v]) => 
            `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';

        document.getElementById('yearlySummary').innerHTML = Object.entries(yearMap).sort().reverse().map(([k, v]) => 
            `<div class="summary-item" style="color:var(--primary); font-weight:bold;"><span>${k}年度</span><span>$${v.toLocaleString()}</span></div>`).join('') || '無';
    }

    // 初始啟動
    saveAndRender();
</script>

</body>
</html>
