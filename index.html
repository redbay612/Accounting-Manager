<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出管理系統 - 智慧辨識修正版</title>
    <style>
        :root { --primary: #4338ca; --success: #059669; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        .input-card { background: #f1f5f9; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.2fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: #0ea5e9; color: white; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .search-input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; }
        .group-toggle { display: flex; align-items: center; gap: 8px; background: #fffbeb; padding: 10px 15px; border-radius: 8px; border: 1px solid #fef3c7; font-weight: bold; color: #92400e; cursor: pointer; }

        .table-container { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .summary-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .total-row { border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 10px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; background: #e2e8f0; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 支出管理系統 (智慧辨識版)</h1>

    <!-- 輸入區 -->
    <div class="input-card">
        <select id="category">
            <option value="卡費">💳 卡費</option>
            <option value="貸款">🏠 貸款</option>
            <option value="保險">🛡️ 保險</option>
            <option value="生活費">🥗 生活費</option>
            <option value="其他">📦 其他</option>
        </select>
        <input type="text" id="desc" placeholder="項目明細 (如: 台新信用卡)">
        <input type="number" id="amount" placeholder="金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增</button>
    </div>

    <!-- 工具列 -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋名稱或類別..." oninput="renderAll()">
        
        <label class="group-toggle">
            <input type="checkbox" id="groupMode" onchange="renderAll()"> 統整相同項目
        </label>

        <div style="display: flex; gap: 8px;">
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入備份</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            <button class="btn-export" onclick="exportToCSV()">💾 匯出備份</button>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>類別</th>
                    <th>項目明細</th>
                    <th style="text-align: right;">支付金額</th>
                    <th>繳款期限 (付費時間)</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 統計 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h3>📂 類別累計</h3>
            <div id="categorySummary"></div>
            <div id="categoryVerify" class="total-row"></div>
        </div>
        <div class="summary-box">
            <h3>📅 月度統計</h3>
            <div id="monthlySummary"></div>
        </div>
        <div class="summary-box">
            <h3>年度統計</h3>
            <div id="yearlySummary"></div>
        </div>
    </div>
</div>

<script>
    let expenses = (JSON.parse(localStorage.getItem('expense_v9')) || []).map(i => ({ ...i, amount: Number(i.amount) }));

    renderAll();

    function renderAll() {
        renderTable();
        renderSummaries();
    }

    function addItem() {
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('desc').value.trim();
        const amt = document.getElementById('amount').value;
        const date = document.getElementById('dueDate').value;

        if (!desc || !amt || !date) return alert('請填寫完整資訊');

        expenses.push({
            id: Date.now() + Math.random(),
            category: cat,
            desc: desc,
            amount: Number(amt),
            date: date
        });

        saveAndRefresh();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function renderTable() {
        const tbody = document.getElementById('expenseList');
        const isGroupMode = document.getElementById('groupMode').checked;
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        let data = expenses.filter(i => i.desc.toLowerCase().includes(search) || i.category.toLowerCase().includes(search));

        if (isGroupMode) {
            const grouped = {};
            data.forEach(item => {
                const key = `${item.category}-${item.desc}`;
                if (!grouped[key]) {
                    grouped[key] = { ...item, count: 1 };
                } else {
                    grouped[key].amount += item.amount;
                    grouped[key].count += 1;
                    if (new Date(item.date) > new Date(grouped[key].date)) grouped[key].date = item.date;
                }
            });
            data = Object.values(grouped).sort((a,b) => b.amount - a.amount);
        } else {
            data.sort((a,b) => new Date(b.date) - new Date(a.date));
        }

        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge">${item.category}</span></td>
                <td><b>${item.desc}</b>${isGroupMode ? ` (${item.count}筆)` : ''}</td>
                <td style="text-align: right; font-weight: bold;">$${item.amount.toLocaleString()}</td>
                <td>${item.date}</td>
                <td>${isGroupMode ? '' : `<button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:2px 5px; font-size:12px;">刪除</button>`}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderSummaries() {
        const catMap = {}, monMap = {}, yearMap = {};
        let grandTotal = 0;

        expenses.forEach(item => {
            const val = Number(item.amount) || 0;
            catMap[item.category] = (catMap[item.category] || 0) + val;
            monMap[item.date.substring(0, 7)] = (monMap[item.date.substring(0, 7)] || 0) + val;
            yearMap[item.date.substring(0, 4)] = (yearMap[item.date.substring(0, 4)] || 0) + val;
            grandTotal += val;
        });

        document.getElementById('categorySummary').innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';
        document.getElementById('categoryVerify').innerHTML = `<span>總支出：</span><span>$${grandTotal.toLocaleString()}</span>`;
        document.getElementById('monthlySummary').innerHTML = Object.entries(monMap).sort().reverse().slice(0, 5).map(([k,v]) => `<div class="summary-item"><span>${k}</span><b>$${v.toLocaleString()}</b></div>`).join('') || '無';
        document.getElementById('yearlySummary').innerHTML = Object.entries(yearMap).sort().reverse().map(([k,v]) => `<div class="summary-item" style="color:var(--primary); font-weight:bold;"><span>${k}年</span><span>$${v.toLocaleString()}</span></div>`).join('') || '無';
    }

    function deleteItem(id) {
        if(confirm('確定刪除？')) { expenses = expenses.filter(i => i.id !== id); saveAndRefresh(); }
    }

    function saveAndRefresh() { localStorage.setItem('expense_v9', JSON.stringify(expenses)); renderAll(); }

    function exportToCSV() {
        let csv = "\uFEFF類別,項目明細,支付金額,繳款期限\n";
        expenses.forEach(i => csv += `${i.category},${i.desc.replace(/,/g,' ')},${i.amount},${i.date}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `支出備份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    // 重點修正：智慧辨識匯入邏輯
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            const imported = [];
            
            for (let i = 1; i < rows.length; i++) {
                const line = rows[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
                
                let detectedDate = "";
                let detectedAmount = NaN;
                let textFields = [];

                cols.forEach(col => {
                    // 1. 辨識日期 (包含 - 或 / 的文字)
                    if (col.includes('-') || col.includes('/')) {
                        detectedDate = col;
                    } 
                    // 2. 辨識金額 (純數字且不是日期的部分)
                    else if (!isNaN(parseFloat(col.replace(/[$,]/g, ''))) && !detectedDate.includes(col)) {
                        // 如果目前還沒抓到金額，或者這個數字看起來不像年份 (例如不是202x)
                        let num = parseFloat(col.replace(/[$,]/g, ''));
                        if (isNaN(detectedAmount)) {
                            detectedAmount = num;
                        } else {
                            // 如果已經有金額了，通常較小的那個才是真正的支付金額 (日期轉數字通常很大)
                            if (num < detectedAmount && num > 0) {
                                textFields.push(detectedAmount.toString()); // 把之前抓錯的還回去文字
                                detectedAmount = num;
                            } else {
                                textFields.push(col);
                            }
                        }
                    }
                    // 3. 辨識類別與明細 (一般的文字)
                    else {
                        textFields.push(col);
                    }
                });

                if (!isNaN(detectedAmount) && detectedDate) {
                    imported.push({
                        id: Date.now() + Math.random() + i,
                        category: textFields[0] || "其他",
                        desc: textFields[1] || textFields[0] || "未命名",
                        amount: detectedAmount,
                        date: detectedDate
                    });
                }
            }
            if (imported.length > 0) {
                if(confirm(`成功辨識 ${imported.length} 筆資料，要合併至清單嗎？`)) {
                    expenses = [...expenses, ...imported];
                    saveAndRefresh();
                }
            } else { alert('匯入失敗，請確認 CSV 檔案中包含金額與日期格式 (YYYY-MM-DD)'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
