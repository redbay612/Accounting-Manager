<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階財務支出紀錄本</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: #334155;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 30px; font-size: 1.2rem; }

        /* 輸入區 */
        .input-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr auto;
            gap: 12px;
            margin-bottom: 30px;
        }

        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1d4ed8; }
        .btn-export { background: var(--success); color: white; margin-bottom: 10px; }
        .btn-export:hover { background: #059669; }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .text-right { text-align: right; }
        .amount { font-family: 'Courier New', monospace; font-weight: bold; }
        
        .delete-btn { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 2px 8px; font-size: 0.8rem; }
        .delete-btn:hover { background: var(--danger); color: white; }

        /* 統計區塊 */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .summary-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .summary-item.total {
            border-top: 1px solid #cbd5e1;
            padding-top: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .input-card { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 每月支出財務管理</h1>

    <!-- 輸入區 -->
    <div class="input-card">
        <input type="text" id="desc" placeholder="支出項目 (如: 電費)">
        <input type="number" id="amount" placeholder="應繳金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增項目</button>
    </div>

    <div class="action-bar">
        <button class="btn-export" onclick="exportToCSV()">💾 匯出備份 (Excel CSV)</button>
    </div>

    <!-- 明細表 -->
    <h2>📝 支出明細 (所有紀錄)</h2>
    <table>
        <thead>
            <tr>
                <th>項目</th>
                <th class="text-right">金額</th>
                <th>繳款期限</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="expenseList"></tbody>
    </table>

    <!-- 統計報表 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h2>月度總計 (依月份分組)</h2>
            <div id="monthlySummary"></div>
        </div>
        <div class="summary-box">
            <h2>年度累計</h2>
            <div id="yearlySummary"></div>
        </div>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('expense_data')) || [];

    // 初始化
    renderAll();

    function addItem() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const dueDate = document.getElementById('dueDate').value;

        if (!desc || !amount || !dueDate) {
            alert('請填寫完整資訊');
            return;
        }

        const item = {
            id: Date.now(),
            desc: desc,
            amount: parseFloat(amount),
            date: dueDate,
            year: dueDate.substring(0, 4),
            month: dueDate.substring(0, 7) // 格式: YYYY-MM
        };

        expenses.push(item);
        saveData();
        clearInputs();
        renderAll();
    }

    function deleteItem(id) {
        if(confirm('確定刪除？')) {
            expenses = expenses.filter(ex => ex.id !== id);
            saveData();
            renderAll();
        }
    }

    function clearInputs() {
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('dueDate').value = '';
    }

    function saveData() {
        localStorage.setItem('expense_data', JSON.stringify(expenses));
    }

    function renderAll() {
        renderTable();
        renderMonthlySummary();
        renderYearlySummary();
    }

    // 渲染明細表格
    function renderTable() {
        const list = document.getElementById('expenseList');
        list.innerHTML = '';
        
        // 按日期排序 (由新到舊)
        const sorted = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));

        sorted.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.desc}</td>
                <td class="text-right amount">$${item.amount.toLocaleString()}</td>
                <td>${item.date}</td>
                <td><button class="delete-btn" onclick="deleteItem(${item.id})">刪除</button></td>
            `;
            list.appendChild(row);
        });
    }

    // 渲染每月總計
    function renderMonthlySummary() {
        const container = document.getElementById('monthlySummary');
        container.innerHTML = '';

        const monthlyMap = {};
        expenses.forEach(item => {
            monthlyMap[item.month] = (monthlyMap[item.month] || 0) + item.amount;
        });

        // 排序月份
        const sortedMonths = Object.keys(monthlyMap).sort().reverse();

        sortedMonths.forEach(m => {
            const div = document.createElement('div');
            div.className = 'summary-item';
            div.innerHTML = `<span>${m}</span><span class="amount">$${monthlyMap[m].toLocaleString()}</span>`;
            container.appendChild(div);
        });
        
        if (sortedMonths.length === 0) container.innerHTML = '<p style="color:#94a3b8">暫無數據</p>';
    }

    // 渲染年度總計
    function renderYearlySummary() {
        const container = document.getElementById('yearlySummary');
        container.innerHTML = '';

        const yearlyMap = {};
        expenses.forEach(item => {
            yearlyMap[item.year] = (yearlyMap[item.year] || 0) + item.amount;
        });

        const sortedYears = Object.keys(yearlyMap).sort().reverse();

        sortedYears.forEach(y => {
            const div = document.createElement('div');
            div.className = 'summary-item total';
            div.innerHTML = `<span>${y} 年度總計</span><span class="amount">$${yearlyMap[y].toLocaleString()}</span>`;
            container.appendChild(div);
        });

        if (sortedYears.length === 0) container.innerHTML = '<p style="color:#94a3b8">暫無數據</p>';
    }

    // 存檔功能：匯出 CSV
    function exportToCSV() {
        if (expenses.length === 0) {
            alert('沒有資料可以匯出');
            return;
        }

        // CSV 表頭 (加入 BOM 避免 Excel 開啟中文亂碼)
        let csvContent = "\uFEFF"; 
        csvContent += "支出項目,金額,繳款期限,年度,月份\n";

        expenses.forEach(item => {
            csvContent += `${item.desc},${item.amount},${item.date},${item.year},${item.month}\n`;
        });

        // 建立下載連結
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        const timestamp = new Date().toISOString().substring(0, 10);
        link.setAttribute("href", url);
        link.setAttribute("download", `支出紀錄備份_${timestamp}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
