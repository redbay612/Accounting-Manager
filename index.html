<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出管理系統 - 數據精確版</title>
    <style>
        :root {
            --primary: #4338ca;
            --secondary: #64748b;
            --success: #059669;
            --danger: #dc2626;
            --bg: #f8fafc;
        }

        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        .input-card { background: #f1f5f9; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; }
        
        button { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: #0ea5e9; color: white; }

        .toolbar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .search-input { flex-grow: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 6px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; text-align: left; padding: 12px; border-bottom: 2px solid #cbd5e1; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .summary-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        
        .total-row { border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 10px; font-weight: bold; color: var(--primary); }
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 12px; background: #e2e8f0; }

        #fileInput { display: none; }
        @media (max-width: 768px) { .input-card, .summary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 每月支出管理 (精確計得版)</h1>

    <!-- 輸入區 -->
    <div class="input-card">
        <select id="category">
            <option value="卡費">💳 卡費</option>
            <option value="貸款">🏠 貸款</option>
            <option value="保險">🛡️ 保險</option>
            <option value="生活費">🥗 生活費</option>
            <option value="其他">📦 其他</option>
        </select>
        <input type="text" id="desc" placeholder="支出項目">
        <input type="number" id="amount" placeholder="金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增</button>
    </div>

    <!-- 工具列 -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋名稱或類別..." oninput="renderAll()">
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">匯入 CSV</button>
        <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
        <button class="btn-export" onclick="exportToCSV()">匯出 CSV</button>
    </div>

    <!-- 表格 -->
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>類別</th>
                    <th>名稱</th>
                    <th style="text-align: right;">金額</th>
                    <th>期限</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 統計報表 -->
    <div class="summary-grid">
        <!-- 類別統計 -->
        <div class="summary-box">
            <h3>📂 類別累計總額</h3>
            <div id="categorySummary"></div>
            <div id="categoryVerify" class="total-row"></div>
        </div>

        <!-- 月份統計 -->
        <div class="summary-box">
            <h3>📅 月度累計</h3>
            <div id="monthlySummary"></div>
        </div>

        <!-- 年度統計 -->
        <div class="summary-box">
            <h3>年度累計</h3>
            <div id="yearlySummary"></div>
        </div>
    </div>
</div>

<script>
    // 1. 初始化資料並強制清洗 (確保全部都是數字且無空格)
    let expenses = (JSON.parse(localStorage.getItem('expense_v5')) || []).map(item => ({
        ...item,
        category: String(item.category).trim(),
        amount: Number(item.amount) || 0,
        desc: String(item.desc).trim()
    }));

    renderAll();

    function renderAll() {
        renderTable();
        renderSummaries();
    }

    // 2. 新增項目
    function addItem() {
        const cat = document.getElementById('category').value;
        const desc = document.getElementById('desc').value.trim();
        const amt = document.getElementById('amount').value;
        const date = document.getElementById('dueDate').value;

        if (!desc || !amt || !date) return alert('請填寫完整資訊');

        const item = {
            id: Date.now(),
            category: cat,
            desc: desc,
            amount: Number(amt), // 強制數字型態
            date: date,
            year: date.substring(0, 4),
            month: date.substring(0, 7)
        };

        expenses.push(item);
        saveAndRefresh();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    // 3. 核心統計邏輯 (修正加總錯誤)
    function renderSummaries() {
        const catMap = {};
        const monMap = {};
        const yearMap = {};
        let grandTotal = 0;

        expenses.forEach(item => {
            const val = Number(item.amount) || 0;
            const cat = item.category.trim();
            const mon = item.month;
            const year = item.year;

            // 類別加總
            catMap[cat] = (catMap[cat] || 0) + val;
            // 月份加總
            monMap[mon] = (monMap[mon] || 0) + val;
            // 年度加總
            yearMap[year] = (yearMap[year] || 0) + val;
            // 總驗證額
            grandTotal += val;
        });

        // 渲染類別累計
        let catHtml = '';
        Object.keys(catMap).sort().forEach(cat => {
            catHtml += `<div class="summary-item"><span>${cat}</span><b>$${catMap[cat].toLocaleString()}</b></div>`;
        });
        document.getElementById('categorySummary').innerHTML = catHtml || '無數據';
        document.getElementById('categoryVerify').innerHTML = `<span>上述總計：</span><span>$${grandTotal.toLocaleString()}</span>`;

        // 渲染月份累計
        let monHtml = '';
        Object.keys(monMap).sort().reverse().slice(0, 5).forEach(m => {
            monHtml += `<div class="summary-item"><span>${m}</span><b>$${monMap[m].toLocaleString()}</b></div>`;
        });
        document.getElementById('monthlySummary').innerHTML = monHtml || '無數據';

        // 渲染年度累計
        let yearHtml = '';
        Object.keys(yearMap).sort().reverse().forEach(y => {
            yearHtml += `<div class="summary-item" style="color:var(--primary); font-weight:bold;"><span>${y} 年度</span><span>$${yearMap[y].toLocaleString()}</span></div>`;
        });
        document.getElementById('yearlySummary').innerHTML = yearHtml || '無數據';
    }

    // 4. 渲染明細清單 (支援搜尋)
    function renderTable() {
        const tbody = document.getElementById('expenseList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        const filtered = expenses.filter(i => 
            i.desc.toLowerCase().includes(search) || i.category.toLowerCase().includes(search)
        ).sort((a, b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="badge">${item.category}</span></td>
                <td>${item.desc}</td>
                <td style="text-align: right; font-weight: bold;">$${Number(item.amount).toLocaleString()}</td>
                <td>${item.date}</td>
                <td><button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:2px 5px;">刪除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteItem(id) {
        if (!confirm('確定刪除？')) return;
        expenses = expenses.filter(i => i.id !== id);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('expense_v5', JSON.stringify(expenses));
        renderAll();
    }

    // 5. 修正後的匯入匯出功能
    function exportToCSV() {
        if (expenses.length === 0) return alert('無資料');
        let csv = "\uFEFF類別,項目名稱,金額,日期\n";
        expenses.forEach(i => {
            csv += `${i.category},${i.desc},${i.amount},${i.date}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `支出備份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            const imported = [];
            
            for (let i = 1; i < rows.length; i++) {
                const line = rows[i].replace('\r', '').trim(); // 移除 Excel 常見的 \r 換行符
                if (!line) continue;
                
                const cols = line.split(',');
                if (cols.length >= 4) {
                    const cat = cols[0].trim();
                    const desc = cols[1].trim();
                    const amt = Number(cols[2].replace(/[^\d.]/g, '')); // 移除可能存在的貨幣符號
                    const date = cols[3].trim();

                    if (!isNaN(amt) && date) {
                        imported.push({
                            id: Date.now() + Math.random(),
                            category: cat,
                            desc: desc,
                            amount: amt,
                            date: date,
                            year: date.substring(0, 4),
                            month: date.substring(0, 7)
                        });
                    }
                }
            }
            if (imported.length > 0) {
                if (confirm(`成功解析 ${imported.length} 筆資料，要覆蓋並取代目前的紀錄嗎？(按取消則為合併)`)) {
                    expenses = imported;
                } else {
                    expenses = [...expenses, ...imported];
                }
                saveAndRefresh();
            } else {
                alert('匯入格式不正確，請確保 CSV 欄位為：類別,項目名稱,金額,日期');
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
