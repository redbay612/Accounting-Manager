<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出紀錄管理 - 精簡版</title>
    <style>
        :root { --primary: #4338ca; --success: #059669; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        /* 輸入區：只有類別、金額、日期 */
        .input-card { background: #f1f5f9; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        button { padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-export { background: var(--success); color: white; }
        .btn-import { background: #0ea5e9; color: white; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        .search-input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; }

        .table-container { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: var(--secondary); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .summary-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .summary-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-weight: bold; }
        .total-row { border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 10px; font-weight: bold; color: var(--primary); font-size: 1.2rem; }

        #fileInput { display: none; }
        @media (max-width: 600px) { .input-card, .summary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 支出管理系統 (精簡修正版)</h1>

    <!-- 1. 輸入區 -->
    <div class="input-card">
        <input type="text" id="category" list="cat-list" placeholder="輸入或選擇類別 (如: 星展卡費)">
        <datalist id="cat-list">
            <option value="星展卡費">
            <option value="玉山卡費">
            <option value="台新卡費">
            <option value="房租">
            <option value="生活費">
        </datalist>
        <input type="number" id="amount" placeholder="支付金額">
        <input type="date" id="dueDate">
        <button class="btn-add" onclick="addItem()">新增</button>
    </div>

    <!-- 2. 工具列 -->
    <div class="toolbar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 搜尋類別或月份..." oninput="renderAll()">
        <div style="display: flex; gap: 8px;">
            <button class="btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importCSV(event)">
            <button class="btn-export" onclick="exportToCSV()">💾 匯出</button>
        </div>
    </div>

    <!-- 3. 表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>支出類別</th>
                    <th style="text-align: right;">支付金額</th>
                    <th>付費日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>
    </div>

    <!-- 4. 統計 -->
    <div class="summary-grid">
        <div class="summary-box">
            <h3>📂 類別累計總額</h3>
            <div id="categorySummary"></div>
            <div id="grandTotalDisplay" class="total-row"></div>
        </div>
        <div class="summary-box">
            <h3>📅 月度統計</h3>
            <div id="monthlySummary"></div>
        </div>
    </div>
</div>

<script>
    let expenses = (JSON.parse(localStorage.getItem('expense_v10')) || []).map(i => ({ ...i, amount: Number(i.amount) }));

    renderAll();

    function renderAll() {
        renderTable();
        renderSummaries();
    }

    function addItem() {
        const cat = document.getElementById('category').value.trim();
        const amt = document.getElementById('amount').value;
        const date = document.getElementById('dueDate').value;

        if (!cat || !amt || !date) return alert('請完整填寫類別、金額與日期');

        expenses.push({
            id: Date.now() + Math.random(),
            category: cat,
            amount: Number(amt),
            date: date
        });

        saveAndRefresh();
        document.getElementById('category').value = '';
        document.getElementById('amount').value = '';
    }

    function renderTable() {
        const tbody = document.getElementById('expenseList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        tbody.innerHTML = '';

        const filtered = expenses.filter(i => 
            i.category.toLowerCase().includes(search) || i.date.includes(search)
        ).sort((a,b) => new Date(b.date) - new Date(a.date));

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${item.category}</b></td>
                <td style="text-align: right; font-weight: bold; color: var(--primary);">$${item.amount.toLocaleString()}</td>
                <td>${item.date}</td>
                <td><button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:2px 5px; font-size:12px;">刪除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderSummaries() {
        const catMap = {}, monMap = {};
        let grandTotal = 0;

        expenses.forEach(item => {
            const val = Number(item.amount) || 0;
            catMap[item.category] = (catMap[item.category] || 0) + val;
            monMap[item.date.substring(0, 7)] = (monMap[item.date.substring(0, 7)] || 0) + val;
            grandTotal += val;
        });

        document.getElementById('categorySummary').innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
            <div class="summary-item"><span>${k}</span><span>$${v.toLocaleString()}</span></div>
        `).join('') || '無資料';

        document.getElementById('grandTotalDisplay').innerHTML = `<span>總計支出：</span><span>$${grandTotal.toLocaleString()}</span>`;

        document.getElementById('monthlySummary').innerHTML = Object.entries(monMap).sort().reverse().slice(0, 6).map(([k,v]) => `
            <div class="summary-item"><span>${k}</span><span>$${v.toLocaleString()}</span></div>
        `).join('') || '無資料';
    }

    function deleteItem(id) {
        if(confirm('確定刪除？')) { expenses = expenses.filter(i => i.id !== id); saveAndRefresh(); }
    }

    function saveAndRefresh() { localStorage.setItem('expense_v10', JSON.stringify(expenses)); renderAll(); }

    function exportToCSV() {
        let csv = "\uFEFF類別,支付金額,付費日期\n";
        expenses.forEach(i => csv += `${i.category},${i.amount},${i.date}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `支出備份_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    // 智慧匯入：只辨識「日期」跟「金額」，其餘皆為「類別」
    function importCSV(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n');
            const imported = [];
            
            for (let i = 1; i < rows.length; i++) {
                const line = rows[i].trim();
                if (!line) continue;
                const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
                
                let detectedDate = "";
                let detectedAmount = NaN;
                let detectedCategory = "";

                cols.forEach(col => {
                    // 1. 辨識日期
                    if (col.includes('-') || col.includes('/')) {
                        detectedDate = col.replace(/\//g, '-');
                    } 
                    // 2. 辨識金額 (數字且非日期)
                    else if (!isNaN(parseFloat(col.replace(/[$,]/g, ''))) && !col.includes('-')) {
                        let num = parseFloat(col.replace(/[$,]/g, ''));
                        // 排除可能是年份的超大數字 (如 20260205)
                        if (isNaN(detectedAmount) || (num < 1000000)) {
                            detectedAmount = num;
                        }
                    }
                    // 3. 辨識類別 (文字)
                    else if (col.length > 0) {
                        detectedCategory = col;
                    }
                });

                if (!isNaN(detectedAmount) && detectedDate) {
                    imported.push({
                        id: Date.now() + Math.random() + i,
                        category: detectedCategory || "未分類",
                        amount: detectedAmount,
                        date: detectedDate
                    });
                }
            }
            if (imported.length > 0) {
                if(confirm(`成功匯入 ${imported.length} 筆資料！`)) {
                    expenses = [...expenses, ...imported];
                    saveAndRefresh();
                }
            } else { alert('無法辨識檔案，請確保 CSV 包含金額與日期。'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
